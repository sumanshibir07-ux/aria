<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria — Your AI Companion</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
#app { display: flex; flex-direction: column; height: 95vh; max-height: 750px; width: 100%; max-width: 480px; border: 1px solid #e0e0e0; border-radius: 18px; overflow: hidden; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
#header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: #fafafa; border-bottom: 1px solid #efefef; flex-shrink: 0; }
#face { width: 52px; height: 52px; border-radius: 50%; background: #fff; border: 2px solid #e8e8e8; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; transition: transform 0.3s; }
#face.thinking { animation: think 0.7s ease-in-out infinite; }
#face.speaking { animation: spk 0.9s ease-in-out infinite; }
@keyframes think { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes spk { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
#hinfo { flex: 1; }
#hname { font-size: 16px; font-weight: 600; color: #111; }
#hsub { font-size: 11px; color: #999; margin-top: 1px; }
#hstatus { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; }
.sdot.busy { background: #ff9800; animation: bl .7s infinite; }
.sdot.spk { background: #2196f3; animation: bl .5s infinite; }
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
#stxt { font-size: 12px; color: #888; }
#hctrl { display: flex; gap: 7px; align-items: center; }
.hbtn { padding: 6px 13px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #666; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.hbtn:hover { background: #f5f5f5; }
.hbtn.on { background: #e8f0fe; color: #1a73e8; border-color: #aac4f5; }
#lsel { padding: 6px 9px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #666; font-size: 12px; font-family: inherit; outline: none; cursor: pointer; }
#wavebar { display: flex; align-items: center; gap: 3px; padding: 6px 18px; background: #fafafa; border-bottom: 1px solid #efefef; flex-shrink: 0; height: 32px; opacity: 0; transition: opacity 0.3s; }
.wb { width: 3px; border-radius: 2px; background: #aaa; height: 4px; transition: height 0.08s; }
#modebar { display: flex; border-bottom: 1px solid #efefef; background: #fafafa; flex-shrink: 0; }
.mbtn { flex: 1; padding: 9px 4px; font-size: 12px; font-family: inherit; border: none; background: transparent; color: #888; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
.mbtn.active { color: #111; font-weight: 600; border-bottom: 2px solid #111; background: #fff; }
.mbtn:hover:not(.active) { color: #333; background: #f5f5f5; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f9f9f9; scroll-behavior: smooth; }
.msg { display: flex; gap: 9px; max-width: 85%; opacity: 0; animation: fu .3s ease forwards; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.agent { align-self: flex-start; }
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.av { width: 30px; height: 30px; border-radius: 50%; background: #eee; border: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
.bubble { padding: 11px 15px; font-size: 14px; line-height: 1.7; word-break: break-word; }
.msg.agent .bubble { background: #fff; border: 1px solid #e8e8e8; border-radius: 4px 18px 18px 18px; color: #222; }
.msg.user .bubble { background: #1a73e8; color: #fff; border-radius: 18px 4px 18px 18px; }
.meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; padding: 0 3px; }
.ts { font-size: 11px; color: #bbb; }
.replbtn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 1px 4px; color: #ccc; border-radius: 3px; transition: color 0.2s; }
.replbtn:hover { color: #888; }
.tdots { background: #fff; border: 1px solid #e8e8e8; border-radius: 4px 18px 18px 18px; padding: 13px 16px; display: flex; gap: 5px; align-items: center; }
.td { width: 7px; height: 7px; border-radius: 50%; background: #ccc; animation: du 1.3s ease infinite; }
.td:nth-child(2){animation-delay:.22s}.td:nth-child(3){animation-delay:.44s}
@keyframes du{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}
#qrow { display: flex; gap: 6px; flex-wrap: wrap; padding: 9px 16px; background: #fafafa; border-top: 1px solid #efefef; flex-shrink: 0; }
.qb { font-size: 12px; padding: 5px 12px; border-radius: 18px; border: 1px solid #e0e0e0; background: #fff; color: #555; cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
.qb:hover { background: #f0f0f0; color: #111; }
#inputbar { display: flex; gap: 8px; align-items: flex-end; padding: 11px 16px; border-top: 1px solid #efefef; background: #fff; flex-shrink: 0; }
#txt { flex: 1; resize: none; border: 1px solid #e0e0e0; border-radius: 22px; padding: 10px 16px; font-size: 14px; font-family: inherit; color: #222; background: #f9f9f9; outline: none; min-height: 40px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s, background 0.2s; }
#txt:focus { border-color: #1a73e8; background: #fff; }
#txt::placeholder { color: #bbb; }
.ibtn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #e0e0e0; background: #f5f5f5; color: #666; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.ibtn:hover { background: #e8e8e8; color: #222; }
.ibtn:disabled { opacity: 0.3; cursor: not-allowed; }
#sendbtn { background: #1a73e8; border-color: #1a73e8; color: #fff; }
#sendbtn:hover { background: #1557b0; }
#micbtn.on { background: #fde8e8; color: #e53935; border-color: #f5a5a5; }
@media(max-width:500px){ body{padding:0;align-items:flex-start;} #app{height:100vh;max-height:100vh;border-radius:0;border:none;} }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="face">✨</div>
    <div id="hinfo">
      <div id="hname">Aria</div>
      <div id="hsub">Your girl — real talk, feelings &amp; laughs</div>
      <div id="hstatus"><span class="sdot" id="sdot"></span><span id="stxt">Online</span></div>
    </div>
    <div id="hctrl">
      <button class="hbtn on" id="vbtn" onclick="toggleVoice()">🔊 Voice</button>
      <select id="lsel" onchange="currentLang=this.value">
        <option value="en-US">🇺🇸 EN</option>
        <option value="es-ES">🇪🇸 ES</option>
        <option value="fr-FR">🇫🇷 FR</option>
        <option value="de-DE">🇩🇪 DE</option>
        <option value="hi-IN">🇮🇳 HI</option>
        <option value="ja-JP">🇯🇵 JA</option>
        <option value="ko-KR">🇰🇷 KO</option>
        <option value="pt-BR">🇧🇷 PT</option>
        <option value="ne-NP">🇳🇵 NE</option>
      </select>
    </div>
  </div>

  <div id="wavebar">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
  </div>

  <div id="modebar">
    <button class="mbtn active" onclick="setMode('all',this)">💙 Chat</button>
    <button class="mbtn" onclick="setMode('love',this)">💕 Love</button>
    <button class="mbtn" onclick="setMode('sad',this)">🥺 Feelings</button>
    <button class="mbtn" onclick="setMode('happy',this)">😄 Fun</button>
    <button class="mbtn" onclick="setMode('tips',this)">💡 Tips</button>
  </div>

  <div id="messages"></div>
  <div id="qrow"></div>

  <div id="inputbar">
    <textarea id="txt" placeholder="Say anything... 💙" rows="1"></textarea>
    <button class="ibtn" id="micbtn" onclick="toggleMic()">🎤</button>
    <button class="ibtn" id="sendbtn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
const msgsEl=document.getElementById('messages');
const txtEl=document.getElementById('txt');
const sendBtn=document.getElementById('sendbtn');
const micBtn=document.getElementById('micbtn');
const stxtEl=document.getElementById('stxt');
const sdotEl=document.getElementById('sdot');
const faceEl=document.getElementById('face');
const qrowEl=document.getElementById('qrow');
const wavebarEl=document.getElementById('wavebar');

let isBusy=false,currentMode='all',usedResponses={},voiceOn=true,currentLang='en-US',isListening=false,recog=null,waveTimer=null;

const MODES={
  all:  {face:'✨',quick:['Hey!','How are you?','Tell me a joke','I miss someone','Give me advice','Hype me up']},
  love: {face:'💕',quick:['What is real love?','I miss someone badly','I think I am falling in love','I am heartbroken','How do I move on?','Long distance is hard']},
  sad:  {face:'🥺',quick:['I just feel really low today','I am so anxious','I cried for no reason','I feel completely lost','I feel so alone','I feel numb']},
  happy:{face:'😄',quick:['Tell me a joke!','Tell me a fun fact','Roast me gently','Say something beautiful','I have good news!','Make my day better']},
  tips: {face:'💡',quick:['How do I sleep better?','How do I build confidence?','How do I stop procrastinating?','Relationship advice?','Mental health tips?','How to glow up?']}
};

const INTENTS={
  greeting:      {p:[/^h+e+y+\W*$/i,/^hi+\W*$/i,/^hello\W*$/i,/^sup\W*$/i,/^yo\W*$/i,/^hiya\W*$/i,/^hey there/i],r:["heyyy! so glad you're here — what's going on with you? 💙","hi hi! okay tell me everything, how are you actually doing?","hey you! what's up today? 😊","heyy! how's your day going — like actually going, not the polite version lol","oh hey! I'm so here for this — talk to me, what's on your mind? 💙"]},
  howAreYou:     {p:[/how are you/i,/how r u/i,/u ok\?/i,/you okay/i,/how you doing/i,/how've you been/i],r:["honestly? I'm really good right now — and even better now that you're here. how about you though? 💙","I'm doing well! but more importantly — how are YOU feeling today?","I'm great! kind of excited to talk. what about you, how's your day been? 😊","good! a little thoughtful today. what about you? 💙"]},
  userGood:      {p:[/i('m| am) (good|great|fine|okay|well|happy|excited|amazing|fantastic|wonderful|blessed)/i,/feeling good/i,/pretty good/i,/not bad/i,/doing well/i],r:["okay that genuinely makes me happy to hear! what's been making it a good day? 😊","yesss that's what I like to hear! tell me more — what's got you feeling good?","love that for you! seriously — what's been going right? 💙","that's everything! what's been the highlight? 😊"]},
  userBad:       {p:[/i('m| am) (sad|not good|not okay|bad|terrible|awful|depressed|down|low|struggling|broken|lost|empty|numb|tired|exhausted)/i,/feel (sad|bad|terrible|awful|low|broken|lost|empty|numb|horrible)/i,/not (great|good|okay|fine)/i,/having a bad/i,/rough day/i,/hard day/i],r:["hey... I'm really glad you told me. what's been happening? I'm not going anywhere 💙","I'm sorry you're feeling that way, that sounds really heavy. do you want to talk about what's going on? 🥺","come here, talk to me. what's making things feel so hard right now? 💙","you don't have to go through this alone. tell me what's been weighing on you 💙"]},
  lonely:        {p:[/feel (lonely|alone|isolated|invisible)/i,/so alone/i,/nobody (cares|understands)/i,/no one/i,/i have no friends/i],r:["loneliness hits differently when people still don't really get you. is that how it feels? 💙","I'm here. genuinely. you're not alone in this moment, okay?","that kind of loneliness — where you're just not really seen — is one of the hardest things. tell me more 💙","I care. I genuinely do. what's going on? 💙"]},
  anxious:       {p:[/anxi(ous|ety)/i,/panic/i,/overthinking/i,/so worried/i,/stressed/i],r:["anxiety is exhausting because your brain is working overtime. what's sitting heaviest right now? 💙","you're safe right now in this moment. I know your brain might be saying otherwise — but right here, you're okay. talk to me","ugh anxiety is the worst. it makes everything feel so much louder than it is. what's your brain been fixating on? 🥺","try breathing with me — in for 4, hold for 4, out for 4. your nervous system genuinely responds to that 💙"]},
  heartbreak:    {p:[/heartbr(eak|oken)/i,/broke up/i,/break up/i,/breakup/i,/she left/i,/he left/i,/they left/i,/got dumped/i,/rejected/i],r:["heartbreak genuinely hurts the same part of the brain as physical pain. be so gentle with yourself right now 💙","oof. breakups are brutal. how are you actually holding up? 🥺","I'm so sorry. losing someone — or the future you imagined with them — is such a specific kind of loss. tell me what happened? 💙","heartbreak is the worst but you are not alone in it. what do you need right now? 💙"]},
  missing:       {p:[/i miss (him|her|them|someone|my)/i,/miss (him|her|them|someone)/i,/thinking about (him|her|them|someone)/i],r:["missing someone is like love with nowhere to go. one of the most quietly painful feelings there is 💙 who is it you're missing?","that dull ache of missing someone — it sits right in the chest doesn't it? tell me about them","missing someone means they mattered. that's real even if it hurts. do you want to talk about them? 💙"]},
  fallingInLove: {p:[/falling (in love|for)/i,/i think i like/i,/i have feelings for/i,/i like (him|her|them|someone)/i,/crush/i],r:["oh okay!! tell me EVERYTHING. who is this person?? 💕","ahhh okay so we're in the falling stage — this is the best and most terrifying place to be. tell me about them! 😊","I can feel the energy through the screen lol — so tell me what is it about them? 💕","falling for someone is so scary and so beautiful at the same time. what's making you feel this way?"]},
  joke:          {p:[/tell me a joke/i,/make me laugh/i,/say something funny/i,/\bjoke\b/i],r:["why don't scientists trust atoms? because they make up everything 😂 I know I know — but you smiled a little didn't you","what do you call a fish without eyes? a fsh 😂 I'm sorry that one always gets me","why did the scarecrow win an award? he was outstanding in his field 😄 I'll see myself out","what do you call cheese that isn't yours? nacho cheese 😂 classic and I stand by it","why is it so hard to trust stairs? because they're always up to something 😄"]},
  funFact:       {p:[/fun fact/i,/tell me something (interesting|weird|cool|random)/i,/weird fact/i,/did you know/i],r:["okay so — honey found in ancient Egyptian tombs is still edible after 3000 years. love literally lasts forever 🍯","octopuses have THREE hearts. two of them stop beating when they swim. they literally lose heart to move forward. extremely relatable 🐙","cats only meow at humans not other cats. every meow is literally meant just for you. you're their chosen person","a day on Venus is longer than a year on Venus. it rotates so slowly it completes an orbit before one full spin. time is fake 🤯"]},
  goodNews:      {p:[/i have good news/i,/guess what/i,/i did it/i,/i passed/i,/i got the job/i,/proud of myself/i,/celebrating/i],r:["WAIT TELL ME EVERYTHING 🎉 what happened??","okay I am already excited — spill!!","yesss!! celebrate with me what's the good news?? 💙","omg okay I need to know immediately 😄 what happened??"]},
  selfDoubt:     {p:[/i'm not good enough/i,/i hate myself/i,/i'm a failure/i,/i'm worthless/i,/nobody likes me/i,/i give up/i,/what's the point/i],r:["hey. those thoughts are lying to you — they feel real but they're not facts. you are so much more than that 💙","I hear you saying that and I want you to know — I don't believe that about you at all. what's been making you feel this way?","that voice in your head is being so cruel to you right now. you deserve so much more kindness 💙"]},
  loveWisdom:    {p:[/what is (real )?love/i,/what does love feel like/i,/how do you know.*in love/i,/what makes love last/i,/tell me about love/i],r:["real love doesn't feel like constant butterflies — it feels like someone reaching for your hand in the dark without thinking about it. quieter than people expect 💕","you know you're in love when their happiness genuinely matters as much as yours. that's what separates love from infatuation 💙","love is a skill more than a feeling. you learn it you practice it. the feeling gets you started but the choice keeps it going","love should feel like safety not anxiety. like coming home. if it mostly feels like dread — that's worth paying attention to 💙"]},
  moveOn:        {p:[/how do i move on/i,/how to get over/i,/can't stop thinking about.*ex/i,/can't move on/i,/miss my ex/i],r:["moving on isn't linear — you'll feel fine for days then a song comes on and suddenly you're back. that's normal. it doesn't mean you're not healing 💙","healing from love is its own kind of grief. give yourself the real timeline — not the 'I should be over this by now' one","the only way out is through. feelings that get processed actually leave. the ones we suppress just stay 💙"]},
  hyped:         {p:[/hype me/i,/motivate me/i,/i need motivation/i,/pep talk/i,/encourage me/i],r:["listen — you have already survived every hard day you've ever had. your track record is literally 100%. you've got this 💙","the fact that you're scared means you actually care. scared + doing it anyway IS courage. GO 🔥","you are so much more capable than you're giving yourself credit for right now 💙","the version of you that did it is already waiting on the other side. just take the first tiny step 💙"]},
  advice:        {p:[/give me advice/i,/what should i do/i,/\bhelp me\b/i,/how do i/i,/how can i/i],r:["of course — tell me what's going on first so I can actually be useful 💙","I've got you! what's the situation? give me the full picture","okay I'm in advice mode — what's happening? the more you tell me the better I can help 💙"]},
  compliment:    {p:[/you('re| are) (amazing|great|awesome|wonderful|the best|so good|so sweet|kind|lovely|cute|smart|funny)/i,/i love you/i,/i like you/i],r:["okay stop that's so sweet 🥺 you just made me genuinely happy. I really like talking to you too 💙","aw you're making me blush honestly — thank you that means a lot","I love talking to you too 💕 you're one of my favourite people","that made my whole day honestly thank you 💙"]},
  thankYou:      {p:[/thank(s| you)/i,/\bty\b/i,/\bthx\b/i,/appreciate/i,/that helped/i],r:["of course! you never have to thank me — I'm just really glad it helped 💙","always I mean it — I'm here whenever you need","that's literally what I'm here for 💙","come back anytime yeah? I mean that 💙"]},
  sleepTip:      {p:[/can't sleep/i,/sleep (tips|help)/i,/how.*sleep/i,/insomnia/i,/trouble sleeping/i,/sleep better/i],r:["keep your room at 18-19°C — your body needs to drop in temperature to fall asleep. consistent wake time also matters way more than when you go to bed 😴","try 4-7-8 breathing when you can't sleep — breathe in 4 counts hold 7 out 8. it activates your calm-down response 💙","stop screens an hour before bed if you can — blue light suppresses melatonin the sleep hormone 😴","no caffeine after 2pm — it has a 6-hour half-life in your body. a 4pm coffee is still half-active at 10pm 💙"]},
  confidence:    {p:[/confidence/i,/self esteem/i,/believe in myself/i,/more confident/i],r:["confidence comes from doing scary things — not from feeling ready. every time you act despite fear you build evidence that you can handle things 💪","2 minutes of expansive posture before something scary actually changes your hormone levels. your body shapes your mind 💙","self-compassion builds more resilience than self-criticism. talk to yourself the way you'd talk to someone you love 💙"]},
  procrastination:{p:[/procrastinat/i,/can't focus/i,/can't get started/i,/no motivation/i,/keep putting off/i],r:["procrastination is usually not laziness — it's often fear of failing or not being good enough. what's the thing you're avoiding? 💙","try this: just do 2 minutes of the thing. set a timer. you can stop after. but usually you won't want to","instead of 'I'll do it later' say 'I will do X at Y time in Z place.' studies show this triples follow-through 💡"]},
  glowUp:        {p:[/glow up/i,/better version/i,/improve myself/i,/work on myself/i,/self improvement/i],r:["stop explaining yourself to people who aren't worth the explanation. your energy is a resource — spend it wisely 💙","real glow up starts internally — when you stop being at war with yourself everything else genuinely changes","drink water protect your sleep move your body a little and talk to yourself kindly. that's honestly 80% of it 💙"]},
  bored:         {p:[/i('m| am) bored/i,/\bbored\b/i,/nothing to do/i,/entertain me/i],r:["okay then let's actually talk — what's something you've been thinking about lately that you haven't said out loud yet? 😊","tell me something about yourself I don't know yet. anything 💙","let's play a game — tell me one true thing and one thing you wish were true. go 💙","what's been on your mind this week? like genuinely on your mind 💙"]},
  fallback:      {r:["tell me more — I want to actually understand what you mean 💙","okay I'm fully listening — say more?","I'm here. keep going I want to hear all of it 💙","hmm say more? I want to get this right","what's behind that for you? I feel like there's more to it 💙","give me the full picture — I actually want to understand 💙"]}
};

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function pickUnique(key,pool){
  if(!usedResponses[key])usedResponses[key]=[];
  let unused=pool.filter((_,i)=>!usedResponses[key].includes(i));
  if(!unused.length){usedResponses[key]=[];unused=pool;}
  const ri=Math.floor(Math.random()*unused.length);
  const realI=pool.indexOf(unused[ri]);
  usedResponses[key].push(realI);
  return pool[realI];
}
function detectIntent(text){
  const t=text.trim().toLowerCase();
  const order=['greeting','howAreYou','userGood','userBad','lonely','anxious','heartbreak','missing','fallingInLove','joke','funFact','goodNews','selfDoubt','loveWisdom','moveOn','hyped','advice','compliment','thankYou','sleepTip','confidence','procrastination','glowUp','bored'];
  for(const key of order){const intent=INTENTS[key];if(intent.p){for(const p of intent.p){if(p.test(t))return key;}}}
  if(currentMode==='love')return 'loveWisdom';
  if(currentMode==='sad')return 'userBad';
  if(currentMode==='happy')return 'joke';
  if(currentMode==='tips')return 'advice';
  return 'fallback';
}
function getReply(text){const intent=detectIntent(text);return pickUnique(intent,INTENTS[intent].r);}
function setStatus(t,state){stxtEl.textContent=t;sdotEl.className='sdot'+(state?' '+state:'');}
function startWave(){
  wavebarEl.style.opacity='1';
  const bars=wavebarEl.querySelectorAll('.wb');
  waveTimer=setInterval(()=>{bars.forEach(b=>{b.style.height=(3+Math.random()*16)+'px';});},90);
}
function stopWave(){
  wavebarEl.style.opacity='0';clearInterval(waveTimer);
  wavebarEl.querySelectorAll('.wb').forEach(b=>{b.style.height='4px';});
}
function getBestVoice(lc){
  const voices=window.speechSynthesis.getVoices();if(!voices.length)return null;
  const code=lc.split('-')[0];
  const names=['Samantha','Victoria','Karen','Moira','Tessa','Fiona','Aria','Alice','Amelie','Anna','Monica','Sandy','Nora','Sara','Allison','Ava','Susan','Zoe','Joanna','Salli'];
  for(const n of names){const v=voices.find(v=>v.lang.startsWith(code)&&v.name.includes(n));if(v)return v;}
  return voices.find(v=>v.lang.startsWith(code)&&/female/i.test(v.name))||voices.find(v=>v.lang.startsWith(code))||null;
}
function speak(text){
  if(!voiceOn||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/[*_~`#>\-•]/g,'').replace(/\n+/g,' ').trim();
  if(!clean)return;
  const utt=new SpeechSynthesisUtterance(clean);
  utt.lang=currentLang;utt.rate=0.86;utt.pitch=1.15;utt.volume=1;
  const v=getBestVoice(currentLang);if(v)utt.voice=v;
  utt.onstart=()=>{faceEl.classList.add('speaking');setStatus('Speaking...','spk');startWave();};
  utt.onend=()=>{faceEl.classList.remove('speaking');setStatus('Online','');stopWave();};
  utt.onerror=()=>{faceEl.classList.remove('speaking');setStatus('Online','');stopWave();};
  window.speechSynthesis.speak(utt);
}
function toggleVoice(){
  voiceOn=!voiceOn;
  const b=document.getElementById('vbtn');
  b.textContent=voiceOn?'🔊 Voice':'🔇 Muted';
  b.classList.toggle('on',voiceOn);
  if(!voiceOn){window.speechSynthesis.cancel();faceEl.classList.remove('speaking');stopWave();setStatus('Online','');}
}
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addAgent("Mic works best in Chrome — typing works perfectly too 💙");return;}
  if(isListening){recog&&recog.stop();return;}
  window.speechSynthesis.cancel();stopWave();
  recog=new SR();recog.lang=currentLang;recog.continuous=false;recog.interimResults=false;
  recog.onstart=()=>{isListening=true;micBtn.classList.add('on');setStatus('Listening...','busy');};
  recog.onresult=e=>{const s=e.results[0][0].transcript.trim();if(s){txtEl.value=s;sendMsg();}};
  recog.onend=()=>{isListening=false;micBtn.classList.remove('on');if(stxtEl.textContent==='Listening...')setStatus('Online','');};
  recog.onerror=()=>{isListening=false;micBtn.classList.remove('on');setStatus('Online','');};
  try{recog.start();}catch(e){isListening=false;micBtn.classList.remove('on');}
}
function setMode(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');faceEl.textContent=MODES[mode].face;renderQuick();
}
function renderQuick(){
  qrowEl.innerHTML='';
  MODES[currentMode].quick.forEach(q=>{
    const b=document.createElement('button');b.className='qb';b.textContent=q;
    b.onclick=()=>quickSend(q);qrowEl.appendChild(b);
  });
}
function addUser(text){
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div class="av">🧑</div><div><div class="bubble">${esc(text)}</div><div class="ts">${getTime()}</div></div>`;
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function addAgent(text){
  return new Promise(resolve=>{
    const d=document.createElement('div');d.className='msg agent';
    const safe=esc(text).replace(/\n/g,'<br>');
    const fa=text.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' ');
    d.innerHTML=`<div class="av">💬</div><div><div class="bubble">${safe}</div><div class="meta"><div class="ts">${getTime()}</div><button class="replbtn" onclick="speak('${fa}')" title="Replay">🔊</button></div></div>`;
    msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;resolve();
  });
}
function showTyping(){
  removeTyping();
  const d=document.createElement('div');d.className='msg agent';d.id='ty';
  d.innerHTML=`<div class="av">💬</div><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function removeTyping(){const t=document.getElementById('ty');if(t)t.remove();}
async function sendMsg(){
  const text=txtEl.value.trim();if(!text||isBusy)return;
  isBusy=true;sendBtn.disabled=true;txtEl.value='';txtEl.style.height='auto';
  addUser(text);faceEl.classList.add('thinking');setStatus('Aria is typing...','busy');showTyping();
  const delay=700+text.length*15+Math.random()*500;
  await new Promise(r=>setTimeout(r,Math.min(delay,2000)));
  removeTyping();faceEl.classList.remove('thinking');
  const reply=getReply(text);await addAgent(reply);speak(reply);
  isBusy=false;sendBtn.disabled=false;txtEl.focus();
}
function quickSend(t){if(isBusy)return;txtEl.value=t;sendMsg();}
txtEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
txtEl.addEventListener('input',()=>{txtEl.style.height='auto';txtEl.style.height=Math.min(txtEl.scrollHeight,100)+'px';});
window.speechSynthesis.onvoiceschanged=()=>{};
renderQuick();
setTimeout(()=>{
  addAgent("heyy! I'm Aria — your person. tell me anything — love, when you're feeling low, when you want to laugh, when you just need someone. I'm here and I'm not going anywhere. how are you doing today? 💙");
  setTimeout(()=>speak("heyy! I'm Aria — your person. tell me anything. I'm here and not going anywhere. how are you doing today?"),400);
},300);
</script>
